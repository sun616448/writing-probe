<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thinking Probe — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      padding: 60px 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 14px;
      color: #666;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #444;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #d4d4d4;
      border-radius: 8px;
      outline: none;
      font-family: monospace;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #888;
    }

    .show-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      user-select: none;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #999;
      line-height: 1.5;
    }

    .hint a {
      color: #555;
    }

    button {
      margin-top: 28px;
      width: 100%;
      padding: 11px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #333; }

    #status {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      color: #2e7d32;
      font-weight: 500;
    }

    #status.error { color: #c62828; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Thinking Probe</div>
    <div class="tagline">Socratic writing coach for Google Docs</div>

    <label for="apiKey">Anthropic API Key</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />

    <label class="show-toggle">
      <input type="checkbox" id="showKey" />
      Show key
    </label>

    <p class="hint">
      Your key is stored locally in your browser and never sent anywhere except
      directly to the Anthropic API. Get a key at
      <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>.
    </p>

    <button id="saveBtn">Save API Key</button>
    <div id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
